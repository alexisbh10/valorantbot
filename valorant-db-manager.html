<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valorant DB Manager</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#ffffff;--surface-2:#f3f2ee;--surface-off:#eae9e4;
  --border:rgba(0,0,0,0.09);--text:#1a1915;--muted:#6b6a66;--faint:#b0afa9;
  --primary:#01696f;--primary-h:#e0f0f0;--primary-btn:#01696f;--primary-btn-txt:#fff;
  --red:#c0392b;--red-h:#fde8e6;--green:#2d7a3a;--green-h:#e6f5e9;
  --gold:#b8860b;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --radius:8px;--radius-lg:12px;--font:'Satoshi',sans-serif;--t:150ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#0f0e0c;--surface:#1a1917;--surface-2:#222120;--surface-off:#2a2927;
  --border:rgba(255,255,255,0.07);--text:#d4d3d0;--muted:#7a7977;--faint:#4a4947;
  --primary:#4f98a3;--primary-h:#1a3035;--primary-btn:#4f98a3;--primary-btn-txt:#000;
  --red:#e57373;--red-h:#3a1a1a;--green:#6daa45;--green-h:#1a3020;
  --gold:#e8af34;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100dvh}
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:48px 1fr;min-height:100dvh}
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
.logo svg{color:var(--primary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:background var(--t),color var(--t);border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface-off);color:var(--text)}
.nav-item.active{background:var(--primary-h);color:var(--primary);font-weight:600}
.nav-item svg{flex-shrink:0;width:16px;height:16px}
.nav-sep{height:1px;background:var(--border);margin:8px 4px}
.main{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:600;font-size:14px}
.card-body{padding:18px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:500;color:var(--muted)}
.field input,.field select{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;font-family:var(--font);color:var(--text);transition:border-color var(--t)}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;transition:all var(--t)}
.btn-primary{background:var(--primary-btn);color:var(--primary-btn-txt)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-off);color:var(--text)}
.btn-danger{background:var(--red-h);color:var(--red);border:1px solid transparent}
.btn-danger:hover{opacity:.8}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;border-radius:var(--radius);background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all var(--t)}
.btn-icon:hover{background:var(--surface-off);color:var(--text)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--surface-2)}
th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-off)}
.td-num{font-weight:600;font-variant-numeric:tabular-nums lining-nums}
.td-muted{color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-win{background:var(--green-h);color:var(--green)}
.badge-loss{background:var(--red-h);color:var(--red)}
.badge-rank{background:var(--surface-off);color:var(--gold);font-size:10px}
#toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 18px;box-shadow:var(--shadow);font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;max-width:280px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-left:3px solid var(--green);color:var(--green)}
#toast.err{border-left:3px solid var(--red);color:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);width:100%;max-width:480px;margin:16px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:600;font-size:14px}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:12px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.kpi-val{font-size:22px;font-weight:700;line-height:1.2;font-variant-numeric:tabular-nums;margin-top:3px}
.kpi-val.pos{color:var(--green)}.kpi-val.neg{color:var(--red)}.kpi-val.gold{color:var(--gold)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;font-family:var(--font);color:var(--text)}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--primary)}
.section{display:none;flex-direction:column;gap:16px}
.section.active{display:flex}
.empty{text-align:center;padding:40px;color:var(--faint);font-size:13px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;cursor:pointer;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Valorant DB Manager
  </div>
  <div class="topbar-right">
    <div id="db-status" style="font-size:12px;color:var(--muted)">⬤ Sin conectar</div>
    <button class="theme-btn" onclick="toggleTheme()">☀ / ☾</button>
  </div>
</header>
<nav class="sidebar">
  <button class="nav-item active" onclick="showSection('jugadores',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Jugadores
  </button>
  <button class="nav-item" onclick="showSection('partidas',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Partidas
  </button>
  <div class="nav-sep"></div>
  <button class="nav-item" onclick="showSection('resumen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Resumen DB
  </button>
</nav>
<main class="main">

  <!-- JUGADORES -->
  <div class="section active" id="section-jugadores">
    <div class="kpi-row" id="jugadores-kpis"></div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">👥 Jugadores registrados</span>
        <button class="btn btn-primary btn-sm" onclick="openModalJugador()">+ Añadir</button>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Server ID</th><th>Nombre</th><th>Tag</th><th>Último rango</th><th>Acciones</th></tr></thead>
            <tbody id="jugadores-tbody"><tr><td colspan="6" class="empty">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- PARTIDAS -->
  <div class="section" id="section-partidas">
    <div class="filter-bar">
      <input id="filter-jugador" placeholder="🔍 Filtrar por jugador..." oninput="loadPartidas()" style="flex:1;min-width:160px">
      <select id="filter-modo" onchange="loadPartidas()">
        <option value="">Todos los modos</option>
        <option value="Competitive">Competitive</option>
        <option value="Unrated">Unrated</option>
        <option value="Swiftplay">Swiftplay</option>
        <option value="Skirmish 1v1">Skirmish 1v1</option>
        <option value="Skirmish 2v2">Skirmish 2v2</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="loadPartidas()">↺ Recargar</button>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">🎮 Historial de partidas</span>
        <span id="partidas-count" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Jugador</th><th>Agente</th><th>Mapa</th><th>Modo</th>
              <th>K/D/A</th><th>ACS</th><th>ADR</th><th>HS%</th><th>KAST</th><th>DDA</th><th>Resultado</th><th>Fecha</th><th></th>
            </tr></thead>
            <tbody id="partidas-tbody"><tr><td colspan="13" class="empty">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- RESUMEN -->
  <div class="section" id="section-resumen">
    <div class="kpi-row" id="resumen-kpis"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-head"><span class="card-title">📊 Partidas por modo</span></div>
        <div class="card-body" id="modos-list"><div class="empty">Sin datos</div></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">🎭 Top agentes</span></div>
        <div class="card-body" id="agentes-list"><div class="empty">Sin datos</div></div>
      </div>
    </div>
  </div>

</main>
</div>

<!-- MODAL JUGADOR -->
<div class="modal-bg" id="modal-jugador">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-jugador-title">Añadir jugador</span>
      <button class="btn-icon" onclick="closeModal('modal-jugador')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="jugador-edit-id">
      <div class="field"><label>Server ID</label><input id="jugador-server" placeholder="ID del servidor Discord"></div>
      <div class="field"><label>Nombre</label><input id="jugador-nombre" placeholder="ej: alexisbh"></div>
      <div class="field"><label>Tag</label><input id="jugador-tag" placeholder="ej: 5576"></div>
      <div class="field"><label>Último rango</label>
        <select id="jugador-rango">
          <option value="">Sin rango</option>
          <option>Iron 1</option><option>Iron 2</option><option>Iron 3</option>
          <option>Bronze 1</option><option>Bronze 2</option><option>Bronze 3</option>
          <option>Silver 1</option><option>Silver 2</option><option>Silver 3</option>
          <option>Gold 1</option><option>Gold 2</option><option>Gold 3</option>
          <option>Platinum 1</option><option>Platinum 2</option><option>Platinum 3</option>
          <option>Diamond 1</option><option>Diamond 2</option><option>Diamond 3</option>
          <option>Ascendant 1</option><option>Ascendant 2</option><option>Ascendant 3</option>
          <option>Immortal 1</option><option>Immortal 2</option><option>Immortal 3</option>
          <option>Radiant</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-jugador')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveJugador()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL PARTIDA EDIT -->
<div class="modal-bg" id="modal-partida">
  <div class="modal" style="max-width:580px">
    <div class="modal-head">
      <span class="modal-title">✏️ Editar partida</span>
      <button class="btn-icon" onclick="closeModal('modal-partida')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-match-id">
      <input type="hidden" id="edit-jugador-nombre">
      <input type="hidden" id="edit-jugador-tag">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div class="field"><label>Kills</label><input id="edit-kills" type="number" min="0"></div>
        <div class="field"><label>Deaths</label><input id="edit-deaths" type="number" min="0"></div>
        <div class="field"><label>Assists</label><input id="edit-assists" type="number" min="0"></div>
        <div class="field"><label>ACS</label><input id="edit-acs" type="number" min="0"></div>
        <div class="field"><label>ADR</label><input id="edit-adr" type="number" step="0.1" min="0"></div>
        <div class="field"><label>HS%</label><input id="edit-hs" type="number" step="0.1" min="0" max="100"></div>
        <div class="field"><label>KAST%</label><input id="edit-kast" type="number" step="0.1" min="0" max="100"></div>
        <div class="field"><label>DDA</label><input id="edit-dda" type="number" step="0.1"></div>
        <div class="field"><label>Rounds jugados</label><input id="edit-rounds" type="number" min="0"></div>
        <div class="field"><label>Daño infligido</label><input id="edit-dmg-dealt" type="number" min="0"></div>
        <div class="field"><label>Daño recibido</label><input id="edit-dmg-recv" type="number" min="0"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px">
        <div class="field"><label>Mapa</label>
          <select id="edit-mapa">
            <option>Ascent</option><option>Bind</option><option>Breeze</option><option>Fracture</option>
            <option>Haven</option><option>Icebox</option><option>Lotus</option><option>Pearl</option>
            <option>Split</option><option>Sunset</option><option>Abyss</option>
          </select>
        </div>
        <div class="field"><label>Modo</label>
          <select id="edit-modo">
            <option>Competitive</option><option>Unrated</option><option>Swiftplay</option>
            <option>Skirmish 1v1</option><option>Skirmish 2v2</option>
          </select>
        </div>
        <div class="field"><label>Resultado</label>
          <select id="edit-won">
            <option value="true">Victoria ✅</option>
            <option value="false">Derrota ❌</option>
          </select>
        </div>
        <div class="field" style="grid-column:1/-1"><label>Agente</label>
          <select id="edit-agente">
            <option>Astra</option><option>Breach</option><option>Brimstone</option><option>Chamber</option>
            <option>Clove</option><option>Cypher</option><option>Deadlock</option><option>Fade</option>
            <option>Gekko</option><option>Harbor</option><option>Iso</option><option>Jett</option>
            <option>KAY/O</option><option>Killjoy</option><option>Neon</option><option>Omen</option>
            <option>Phoenix</option><option>Raze</option><option>Reyna</option><option>Sage</option>
            <option>Skye</option><option>Sova</option><option>Tejo</option><option>Viper</option>
            <option>Vyse</option><option>Yoru</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-partida')">Cancelar</button>
      <button class="btn btn-primary" onclick="savePartida()">Guardar cambios</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://valorantbot-production-b727.up.railway.app';
const SECRET = 'valobot271318';

function toggleTheme(){const r=document.documentElement;r.setAttribute('data-theme',r.getAttribute('data-theme')==='dark'?'light':'dark')}

function showSection(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='jugadores')loadJugadores();
  if(id==='partidas')loadPartidas();
  if(id==='resumen')loadResumen();
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  setTimeout(()=>t.className='',3000);
}

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

async function api(method,path,body){
  try{
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(API+path,opts);
    if(!r.ok)throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){toast('Error: '+e.message,'err');throw e}
}

// ── JUGADORES ──────────────────────────────────────────────
async function loadJugadores(){
  const rows=await api('GET',`/admin/jugadores?secret=${SECRET}`).catch(()=>null);
  if(!rows)return;
  document.getElementById('db-status').innerHTML='<span style="color:var(--green)">⬤ Conectado</span>';
  document.getElementById('jugadores-kpis').innerHTML=`<div class="kpi"><div class="kpi-label">Total jugadores</div><div class="kpi-val gold">${rows.length}</div></div>`;
  const tbody=document.getElementById('jugadores-tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="6" class="empty">No hay jugadores</td></tr>';return}
  tbody.innerHTML=rows.map(r=>`<tr>
    <td class="td-muted td-num">${r.id}</td>
    <td class="td-muted" style="font-size:11px">${r.server_id}</td>
    <td><strong>${r.nombre}</strong></td>
    <td class="td-muted">#${r.tag}</td>
    <td>${r.ultimo_rango?`<span class="badge badge-rank">${r.ultimo_rango}</span>`:'<span class="td-muted">—</span>'}</td>
    <td style="display:flex;gap:4px">
      <button class="btn btn-ghost btn-sm" onclick="editJugador(${r.id},'${r.server_id}','${r.nombre}','${r.tag}','${r.ultimo_rango||''}')">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteJugador(${r.id})">🗑</button>
    </td>
  </tr>`).join('');
}

function openModalJugador(){
  ['jugador-edit-id','jugador-server','jugador-nombre','jugador-tag'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('jugador-rango').value='';
  document.getElementById('modal-jugador-title').textContent='Añadir jugador';
  openModal('modal-jugador');
}

function editJugador(id,server,nombre,tag,rango){
  document.getElementById('jugador-edit-id').value=id;
  document.getElementById('jugador-server').value=server;
  document.getElementById('jugador-nombre').value=nombre;
  document.getElementById('jugador-tag').value=tag;
  document.getElementById('jugador-rango').value=rango;
  document.getElementById('modal-jugador-title').textContent='Editar jugador';
  openModal('modal-jugador');
}

async function saveJugador(){
  const id=document.getElementById('jugador-edit-id').value;
  const body={
    server_id:document.getElementById('jugador-server').value,
    nombre:document.getElementById('jugador-nombre').value,
    tag:document.getElementById('jugador-tag').value,
    ultimo_rango:document.getElementById('jugador-rango').value||null
  };
  if(id){
    await api('PUT',`/admin/jugadores/${id}?secret=${SECRET}`,body);
    toast('Jugador actualizado');
  } else {
    await api('POST',`/admin/jugadores?secret=${SECRET}`,body);
    toast('Jugador añadido');
  }
  closeModal('modal-jugador');
  loadJugadores();
}

async function deleteJugador(id){
  if(!confirm('¿Eliminar jugador?'))return;
  await api('DELETE',`/admin/jugadores/${id}?secret=${SECRET}`);
  toast('Jugador eliminado');
  loadJugadores();
}

// ── PARTIDAS ───────────────────────────────────────────────
async function loadPartidas(){
  const jugador=document.getElementById('filter-jugador').value;
  const modo=document.getElementById('filter-modo').value;
  const p=new URLSearchParams();
  if(jugador)p.set('jugador',jugador);
  if(modo)p.set('modo',modo);
  p.set('secret',SECRET);
  const rows=await api('GET',`/admin/partidas?${p}`).catch(()=>null);
  if(!rows)return;
  document.getElementById('partidas-count').textContent=rows.length+' partidas';
  const tbody=document.getElementById('partidas-tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="13" class="empty">Sin resultados</td></tr>';return}
  tbody.innerHTML=rows.map(r=>{
    const fecha=r.fecha?new Date(r.fecha).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';
    const dda=r.dda!=null?parseFloat(r.dda).toFixed(1):'—';
    const ddaColor=r.dda!=null?(parseFloat(r.dda)>0?'var(--green)':'var(--red)'):'var(--muted)';
    const kast=r.kast!=null?parseFloat(r.kast).toFixed(1)+'%':'—';
    return `<tr>
      <td><strong>${r.jugador_nombre}</strong> <span class="td-muted" style="font-size:11px">#${r.jugador_tag}</span></td>
      <td>${r.agente||'—'}</td>
      <td>${r.mapa||'—'}</td>
      <td class="td-muted" style="font-size:11px">${r.modo||'—'}</td>
      <td class="td-num">${r.kills??'?'}/${r.deaths??'?'}/${r.assists??'?'}</td>
      <td class="td-num">${r.acs??'—'}</td>
      <td class="td-num">${r.adr!=null?parseFloat(r.adr).toFixed(1):'—'}</td>
      <td class="td-num">${r.hs!=null?parseFloat(r.hs).toFixed(1)+'%':'—'}</td>
      <td class="td-num">${kast}</td>
      <td class="td-num" style="color:${ddaColor}">${dda}</td>
      <td><span class="badge ${r.won?'badge-win':'badge-loss'}">${r.won?'Victoria':'Derrota'}</span></td>
      <td class="td-muted" style="font-size:11px">${fecha}</td>
      <td style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-sm" onclick='openEditPartida(${JSON.stringify(r)})'>✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deletePartida('${r.match_id}','${r.jugador_nombre}','${r.jugador_tag}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function openEditPartida(r){
  document.getElementById('edit-match-id').value=r.match_id;
  document.getElementById('edit-jugador-nombre').value=r.jugador_nombre;
  document.getElementById('edit-jugador-tag').value=r.jugador_tag;
  document.getElementById('edit-kills').value=r.kills??0;
  document.getElementById('edit-deaths').value=r.deaths??0;
  document.getElementById('edit-assists').value=r.assists??0;
  document.getElementById('edit-acs').value=r.acs??0;
  document.getElementById('edit-adr').value=r.adr??0;
  document.getElementById('edit-hs').value=r.hs??0;
  document.getElementById('edit-kast').value=r.kast??0;
  document.getElementById('edit-dda').value=r.dda??0;
  document.getElementById('edit-rounds').value=r.rounds_played??0;
  document.getElementById('edit-dmg-dealt').value=r.damage_dealt_total??0;
  document.getElementById('edit-dmg-recv').value=r.damage_received_total??0;
  document.getElementById('edit-mapa').value=r.mapa||'Ascent';
  document.getElementById('edit-modo').value=r.modo||'Competitive';
  document.getElementById('edit-agente').value=r.agente||'Fade';
  document.getElementById('edit-won').value=r.won?'true':'false';
  openModal('modal-partida');
}

async function savePartida(){
  const mid=document.getElementById('edit-match-id').value;
  const nom=document.getElementById('edit-jugador-nombre').value;
  const tag=document.getElementById('edit-jugador-tag').value;
  const body={
    kills:+document.getElementById('edit-kills').value,
    deaths:+document.getElementById('edit-deaths').value,
    assists:+document.getElementById('edit-assists').value,
    acs:+document.getElementById('edit-acs').value,
    adr:+document.getElementById('edit-adr').value,
    hs:+document.getElementById('edit-hs').value,
    kast:+document.getElementById('edit-kast').value,
    dda:+document.getElementById('edit-dda').value,
    rounds_played:+document.getElementById('edit-rounds').value,
    damage_dealt_total:+document.getElementById('edit-dmg-dealt').value,
    damage_received_total:+document.getElementById('edit-dmg-recv').value,
    mapa:document.getElementById('edit-mapa').value,
    modo:document.getElementById('edit-modo').value,
    agente:document.getElementById('edit-agente').value,
    won:document.getElementById('edit-won').value==='true'
  };
  await api('PUT',`/admin/partidas/${encodeURIComponent(mid)}/${encodeURIComponent(nom)}/${encodeURIComponent(tag)}?secret=${SECRET}`,body);
  toast('Partida actualizada');
  closeModal('modal-partida');
  loadPartidas();
}

async function deletePartida(mid,nombre,tag){
  if(!confirm('¿Eliminar esta partida?'))return;
  await api('DELETE',`/admin/partidas/${encodeURIComponent(mid)}/${encodeURIComponent(nombre)}/${encodeURIComponent(tag)}?secret=${SECRET}`);
  toast('Partida eliminada');
  loadPartidas();
}

// ── RESUMEN ────────────────────────────────────────────────
async function loadResumen(){
  // Cargamos datos directamente de las rutas admin
  const jugadores=await api('GET',`/admin/jugadores?secret=${SECRET}`).catch(()=>null);
  const partidas=await api('GET',`/admin/partidas?secret=${SECRET}`).catch(()=>null);
  if(!jugadores||!partidas)return;

  const wins=partidas.filter(p=>p.won).length;
  const wr=partidas.length?Math.round(wins/partidas.length*100):0;

  document.getElementById('resumen-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">Jugadores</div><div class="kpi-val gold">${jugadores.length}</div></div>
    <div class="kpi"><div class="kpi-label">Partidas</div><div class="kpi-val">${partidas.length}</div></div>
    <div class="kpi"><div class="kpi-label">Victorias</div><div class="kpi-val pos">${wins}</div></div>
    <div class="kpi"><div class="kpi-label">Winrate global</div><div class="kpi-val ${wr>=50?'pos':'neg'}">${wr}%</div></div>`;

  // Modos
  const modos={};
  partidas.forEach(p=>{const m=p.modo||'?';modos[m]=(modos[m]||0)+1});
  const modosSort=Object.entries(modos).sort((a,b)=>b[1]-a[1]);
  document.getElementById('modos-list').innerHTML=modosSort.map(([m,c])=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <span>${m}</span><strong>${c}</strong>
    </div>`).join('')||'<div class="empty">Sin datos</div>';

  // Agentes
  const agentes={};
  partidas.forEach(p=>{if(p.agente&&p.agente!=='Desconocido')agentes[p.agente]=(agentes[p.agente]||0)+1});
  const agSort=Object.entries(agentes).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  document.getElementById('agentes-list').innerHTML=agSort.map(([a,c],i)=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <span>${medals[i]} ${a}</span><strong>${c}</strong>
    </div>`).join('')||'<div class="empty">Sin datos</div>';
}

// Carga inicial
loadJugadores();
</script>
</body>
</html>
